# Parameters for the Bridge_Nav mode. Read off the Foxglove map (see plan).
# All numeric values MUST be floats (keep the trailing .0).
car_control_node:
  ros__parameters:
    # Point A (foot/start): flat ground just before the up-ramp, bridge centerline.
    bridge_foot_x: 1.0197175739416042
    bridge_foot_y: 0.583821533973447
    bridge_foot_yaw: 90.26        # deg; set equal to bridge_heading_deg
    # Direction the bridge runs: atan2(B.y - A.y, B.x - A.x) in degrees.
    # B = (1.0087723478210913, 3.036522977645937) → heading ≈ 90.26° (+Y), ~2.45 m total
    bridge_heading_deg: 90.26
    # Arrival / alignment tolerances (SLAM can jump on the ramp — debounce foot arrival).
    foot_reached_thresh_m: 0.3
    foot_reached_hold_sec: 1.0     # must stay within thresh this long before ALIGN
    foot_min_approach_dist_m: 0.5  # ignore foot if never farther than this (SLAM false positive)
    align_tol_deg: 8.0
    # Crossing: odom distance along bridge heading (primary — SLAM drifts on ramp).
    # Split A→B (~2.45 m): ramp ~0.7 + platform ~1.05 + down ~0.7 — tune in Unity.
    cross_up_dist_m: 0.7
    cross_platform_dist_m: 1.05
    cross_down_dist_m: 0.7
    cross_segment_max_sec: 25.0    # safety cap per segment if still stuck
    cross_stuck_time_sec: 2.5      # log + keep driving if odom not increasing
    cross_min_progress_m: 0.04
    # Timed fallback only when odom TF is unavailable.
    cross_up_sec: 8.0
    cross_platform_sec: 8.0
    cross_down_sec: 8.0
    # Speed action per segment (keys from action_config.ACTION_MAPPINGS).
    cross_up_action: "FORWARD"
    cross_platform_action: "FORWARD"
    cross_down_action: "FORWARD"
