services:
  foxglove:
    image: wildbot_workspace
    build:
      context: ../..
      dockerfile: Dockerfile
      network: host
    env_file:
      - .env
    networks:
      - my_bridge_network
    ports:
      - 8765:8765
    command: "ros2 launch foxglove_bridge foxglove_bridge_launch.xml"

networks:
  my_bridge_network:
    driver: bridge
