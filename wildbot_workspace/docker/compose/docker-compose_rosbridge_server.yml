services:
  rosbridge:
    image: ghcr.io/screamlab/wildbot_base_image:latest
    env_file:
      - .env
    networks:
      - my_bridge_network
    ports:
      - 9090:9090
    command: "ros2 launch rosbridge_server rosbridge_websocket_launch.xml delay_between_messages:=0.0"

# This will create a docker bridge networ
# You can see the network by docker network ls
networks:
  my_bridge_network:
    driver: bridge
